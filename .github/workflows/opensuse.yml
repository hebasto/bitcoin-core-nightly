name: openSUSE
on:
  pull_request:
    paths:
      - '.github/workflows/opensuse.yml'
  workflow_dispatch:
    inputs:
      skip_functional_tests:
        description: 'Skip functional tests'
        required: true
        default: false
        type: boolean
  workflow_run:
    workflows: ["Manager"]
    types: [requested]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}${{ github.event_name != 'pull_request' && github.run_id || github.ref }}
  cancel-in-progress: true

jobs:
  opensuse:
    name: 'openSUSE ${{ matrix.release }}'
    runs-on: ubuntu-latest
    container: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - release: 'Leap 16.0'
            image: 'opensuse/leap:16.0'
          - release: 'Tumbleweed'
            image: 'opensuse/tumbleweed:latest'

    steps:
      - name: Checkout Bitcoin Core repo
        uses: actions/checkout@v7
        with:
          repository: bitcoin/bitcoin

      - name: Install dependencies
        run: |
          zypper --non-interactive install --allow-downgrade gawk boost-devel sqlite3-devel libcapnp-devel capnproto zeromq-devel systemtap-sdt-devel qt6-base-devel qt6-tools-devel qt6-linguist-devel qrencode-devel cmake ninja clang llvm

      - name: Get master branch commit hash
        id: master_commit
        # Without git available, the previous `actions/checkout` step downloaded
        # the repository using the GitHub REST API instead of cloning it.
        run: echo "commit=$(awk -F '"' '/^#define GIT_COMMIT_ID/ {print $2}' src/clientversion.cpp)" >> "$GITHUB_OUTPUT"

      - name: Generate CTest configuration
        run: |
          cat << 'EOF' > ctest_config.cmake
          set(CTEST_SITE "${{ github.repository }}")
          set(CTEST_BUILD_NAME "openSUSE ${{ matrix.release }}")
          set(CTEST_SOURCE_DIRECTORY "$ENV{GITHUB_WORKSPACE}")
          set(CTEST_BINARY_DIRECTORY "${CTEST_SOURCE_DIRECTORY}/build")
          set(CTEST_CMAKE_GENERATOR "Ninja")
          cmake_host_system_information(RESULT nproc QUERY NUMBER_OF_LOGICAL_CORES)
          EOF

      - name: CDash -- Start & Update
        shell: ctest --script {0}
        run: |
          include("$ENV{GITHUB_WORKSPACE}/ctest_config.cmake")
          ctest_start(${{ case(github.event_name == 'workflow_run', 'Nightly', format('Experimental GROUP {0}', github.event_name)) }})
          set(CTEST_UPDATE_TYPE git)
          # This command may be redundant once the following MR is merged:
          # https://gitlab.kitware.com/cmake/cmake/-/merge_requests/12038
          find_program(CTEST_UPDATE_COMMAND true)
          set(CTEST_UPDATE_VERSION_OVERRIDE "${{ steps.master_commit.outputs.commit }}")
          ctest_update()

      - name: CDash -- Patch Update.xml
        if: matrix.release == 'Leap 16.0'
        run: |
          # A hack to work around the broken CTEST_UPDATE_VERSION_OVERRIDE.
          sed -i 's/\([[:blank:]]*\)<UpdateType>Unknown<\/UpdateType>/\1<UpdateType>GIT<\/UpdateType>\
            \1<Revision>${{ steps.master_commit.outputs.commit }}<\/Revision>/' "build/Testing/$(head -1 build/Testing/TAG)/Update.xml"

      - name: CDash -- Configure
        shell: ctest --extra-verbose --script {0}
        run: |
          include("$ENV{GITHUB_WORKSPACE}/ctest_config.cmake")
          set(configure_opts
            "--preset dev-mode"
            "-DCMAKE_C_COMPILER=clang"
            "-DCMAKE_CXX_COMPILER=clang++"
            "-DCMAKE_COMPILE_WARNING_AS_ERROR=ON"
          )
          ctest_start(APPEND)
          ctest_configure(OPTIONS "${configure_opts}")

      - name: CDash -- Build
        shell: ctest --extra-verbose --script {0}
        run: |
          include("$ENV{GITHUB_WORKSPACE}/ctest_config.cmake")
          ctest_start(APPEND)
          ctest_build(PARALLEL_LEVEL ${nproc})

      - name: Check 'bitcoind' executable
        run: |
          ls -l build/bin/bitcoind
          file build/bin/bitcoind
          ldd build/bin/bitcoind
          build/bin/bitcoind -version

      - name: CDash -- Test
        shell: ctest --script {0}
        run: |
          include("$ENV{GITHUB_WORKSPACE}/ctest_config.cmake")
          ctest_start(APPEND)
          ctest_test(PARALLEL_LEVEL ${nproc})

      - name: CDash -- Submit
        if: always()
        shell: ctest --script {0}
        run: |
          include("$ENV{GITHUB_WORKSPACE}/ctest_config.cmake")
          ctest_start(APPEND)
          ctest_submit()

      - name: Run functional tests
        if: ${{ ! inputs.skip_functional_tests }}
        run: |
          build/test/functional/test_runner.py -j $(($(nproc) * 2)) --combinedlogslen=99999999 \
            --tmpdirprefix . \
            --extended \
            --exclude interface_bitcoin_cli \
            --exclude 'rpc_bind --ipv6' \
            --timeout-factor=8
