name: Windows, MSVC, x86_64
on:
  pull_request:
    paths:
      - '.github/workflows/windows-msvc-x86_64.yml'
  workflow_dispatch:
  workflow_run:
    workflows: ["Manager"]
    types: [requested]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}${{ github.event_name != 'pull_request' && github.run_id || github.ref }}
  cancel-in-progress: true

jobs:
  windows-native:
    name: 'Windows x86_64, MSVC, Debug'
    runs-on: windows-2025-vs2026
    defaults:
      run:
        shell: pwsh -Command "$PSNativeCommandUseErrorActionPreference = $true; $ErrorActionPreference = 'Stop'; & '{0}'"

    steps:
      - name: Checkout Bitcoin Core repo
        uses: actions/checkout@v6
        with:
          repository: hebasto/bitcoin
          ref: 260625-cmake-qrencode.WIP

      - name: Configure Developer Command Prompt for Microsoft Visual C++
        # Using microsoft/setup-msbuild is not enough.
        uses: ilammy/msvc-dev-cmd@v1

      - name: Using vcpkg with MSBuild
        shell: bash
        run: |
          echo "set(VCPKG_BUILD_TYPE debug)" >> "${VCPKG_INSTALLATION_ROOT}/triplets/x64-windows.cmake"

      - name: Get tool information
        run: |
          cmake -version | Tee-Object -FilePath "cmake_version"
          Write-Output "---"
          msbuild -version | Tee-Object -FilePath "msbuild_version"
          $env:VCToolsVersion | Tee-Object -FilePath "toolset_version"
          py -3 --version
          Write-Host "PowerShell version $($PSVersionTable.PSVersion.ToString())"

      - name: Generate CTest configuration
        run: |
          $config = @'
          set(CTEST_SITE "${{ github.repository }}")
          set(CTEST_BUILD_NAME "Windows x86_64, MSVC, Debug")
          set(CTEST_SOURCE_DIRECTORY "$ENV{GITHUB_WORKSPACE}")
          set(CTEST_BINARY_DIRECTORY "${CTEST_SOURCE_DIRECTORY}/build")
          set(CTEST_CMAKE_GENERATOR "Visual Studio 18 2026")
          '@
          Set-Content -Path "ctest_config.cmake" -Value $config -Encoding utf8

      - name: CDash -- Start & Update
        shell: ctest --script {0}
        run: |
          include("$ENV{GITHUB_WORKSPACE}/ctest_config.cmake")
          ctest_start(${{ case(github.event_name == 'workflow_run', 'Nightly', format('Experimental GROUP {0}', github.event_name)) }})
          find_program(CTEST_GIT_COMMAND git REQUIRED)
          set(CTEST_UPDATE_VERSION_ONLY TRUE)
          ctest_update()

      - name: CDash -- Configure
        shell: ctest --build-config Debug --extra-verbose --script {0}
        run: |
          include("$ENV{GITHUB_WORKSPACE}/ctest_config.cmake")
          set(configure_opts
            "--preset vs2026"
            "-DCMAKE_TOOLCHAIN_FILE=$ENV{VCPKG_INSTALLATION_ROOT}/scripts/buildsystems/vcpkg.cmake"
            "-DBUILD_UTIL_CHAINSTATE=ON"
            "-DBUILD_BENCH=ON"
            "-DCMAKE_COMPILE_WARNING_AS_ERROR=ON"
          )
          ctest_start(APPEND)
          ctest_configure(OPTIONS "${configure_opts}")

      - name: CDash -- Build
        shell: ctest --build-config Debug --extra-verbose --script {0}
        run: |
          include("$ENV{GITHUB_WORKSPACE}/ctest_config.cmake")
          ctest_start(APPEND)
          ctest_build(PARALLEL_LEVEL $ENV{NUMBER_OF_PROCESSORS})

      - name: CDash -- Test
        shell: ctest --build-config Debug --script {0}
        run: |
          include("$ENV{GITHUB_WORKSPACE}/ctest_config.cmake")
          ctest_start(APPEND)
          ctest_test(PARALLEL_LEVEL $ENV{NUMBER_OF_PROCESSORS})

      - name: CDash -- Submit
        if: always()
        shell: ctest --script {0}
        run: |
          include("$ENV{GITHUB_WORKSPACE}/ctest_config.cmake")
          ctest_start(APPEND)
          ctest_submit()
