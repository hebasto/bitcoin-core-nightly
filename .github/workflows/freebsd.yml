name: FreeBSD
on:
  pull_request:
    paths:
      - '.github/actions/build-depends/action.yml'
      - '.github/workflows/freebsd.yml'
  workflow_dispatch:
    inputs:
      repository:
        description: 'Repository name with owner'
        required: true
        default: bitcoin/bitcoin
        type: string
      ref:
        description: 'Repository reference: refs/heads/<branch>, refs/tags/<tag>, refs/pull/<PR>/head or refs/<commit>'
        required: true
        default: refs/heads/master
        type: string
      skip_functional_tests:
        description: 'Skip functional tests'
        required: true
        default: false
        type: boolean
  workflow_run:
    workflows: ["Manager"]
    types: [requested]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}${{ github.event_name != 'pull_request' && github.run_id || github.ref }}
  cancel-in-progress: true

env:
  # See https://docs.github.com/en/actions/reference/runners/github-hosted-runners#standard-github-hosted-runners-for-public-repositories.
  CI_NCPU: 4

jobs:
  freebsd-syslibs:
    name: 'FreeBSD ${{ matrix.release }}, system libs'
    runs-on: ubuntu-latest
    env:
      PACKAGES: 'boost-libs libevent sqlite3 capnproto libzmq4 qt6-base qt6-tools libqrencode'
    defaults:
      run:
        shell: freebsd {0}
    strategy: &RELEASE_MATRIX
      fail-fast: false
      matrix:
        # Test all supported releases.
        # See https://www.freebsd.org/releases/.
        release: ['14.4', '15.1']

    steps:
      - &CLEAR_STORAGE_SPACE
        name: Clear unnecessary files on bloated GHA VM
        uses: bitcoin/bitcoin/.github/actions/clear-files@master

      - &START_VM
        name: Start FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: ${{ matrix.release }}
          prepare: |
            pkg update
            pkg install -y curl cmake-core ninja pkgconf python3 net/py-pyzmq databases/py-sqlite3 lsof ${{ env.PACKAGES }}
          sync: no

      - &FETCH_SOURCE
        name: Fetch source tarball
        run: |
          set -e
          curl --location --fail --output source.tar.gz https://github.com/${{ inputs.repository || 'bitcoin/bitcoin' }}/archive/${{ inputs.ref || 'refs/heads/master' }}.tar.gz
          mkdir bitcoin
          tar -xf source.tar.gz -C bitcoin --strip-components=1
          # Test data.
          DIR_UNIT_TEST_DATA="$(pwd)/qa-assets/unit_test_data"
          mkdir -p "$DIR_UNIT_TEST_DATA"
          curl --location --fail --output "${DIR_UNIT_TEST_DATA}/script_assets_test.json" https://github.com/bitcoin-core/qa-assets/raw/main/unit_test_data/script_assets_test.json

      - name: Generate CTest configuration
        run: |
          cat << 'EOF' > ctest_config.cmake
          set(CTEST_SITE "${{ github.repository }}")
          set(CTEST_BUILD_NAME "FreeBSD ${{ matrix.release }}, system libs")
          set(CTEST_SOURCE_DIRECTORY "${CTEST_SCRIPT_DIRECTORY}/bitcoin")
          set(CTEST_BINARY_DIRECTORY "${CTEST_SCRIPT_DIRECTORY}/build")
          set(CTEST_CMAKE_GENERATOR "Ninja")
          cmake_host_system_information(RESULT nproc QUERY NUMBER_OF_LOGICAL_CORES)
          EOF

      - &CDASH_START_UPDATE
        name: CDash -- Start & Update
        run: |
          COMMIT="$(awk -F '"' '/^#define GIT_COMMIT_ID/ {print $2}' bitcoin/src/clientversion.cpp)"
          echo "set(CTEST_UPDATE_VERSION_OVERRIDE $COMMIT)" >> ctest_update_version_override.cmake
          cat << 'EOF' > ctest_start_upate.cmake
          include(ctest_config.cmake)
          ctest_start(${{ case(github.event_name == 'workflow_run', 'Nightly', format('Experimental GROUP {0}', github.event_name)) }})
          set(CTEST_UPDATE_TYPE git)
          # This command may be redundant once the following MR is merged:
          # https://gitlab.kitware.com/cmake/cmake/-/merge_requests/12038
          set(CTEST_UPDATE_COMMAND "${CMAKE_COMMAND} -E true")
          include(ctest_update_version_override.cmake)
          ctest_update()
          EOF
          ctest --script ctest_start_upate.cmake
          # A hack to work around the broken CTEST_UPDATE_VERSION_OVERRIDE.
          sed -i '' 's/\([[:blank:]]*\)<UpdateType>Unknown<\/UpdateType>/\1<UpdateType>GIT<\/UpdateType>\
            \1<Revision>'"$COMMIT"'<\/Revision>/' "build/Testing/$(head -1 build/Testing/TAG)/Update.xml"

      - name: CDash -- Configure
        run: |
          cat << 'EOF' > ctest_configure.cmake
          include(ctest_config.cmake)
          set(configure_opts
            "--preset dev-mode"
            "-DWITH_USDT=OFF"
            "-DCMAKE_COMPILE_WARNING_AS_ERROR=ON"
          )
          ctest_start(APPEND)
          ctest_configure(OPTIONS "${configure_opts}")
          EOF
          ctest --extra-verbose --script ctest_configure.cmake

      - &CDASH_BUILD
        name: CDash -- Build
        run: |
          cat << 'EOF' > ctest_build.cmake
          include(ctest_config.cmake)
          ctest_start(APPEND)
          ctest_build(PARALLEL_LEVEL ${nproc})
          EOF
          ctest --extra-verbose --script ctest_build.cmake

      - &CHECK_BITCOIND
        name: Check 'bitcoind' executable
        run: |
          set -e
          ls -l build/bin/bitcoind
          file build/bin/bitcoind
          ldd build/bin/bitcoind
          build/bin/bitcoind -version

      - &CDASH_TEST
        name: CDash -- Test
        run: |
          cat << 'EOF' > ctest_test.cmake
          include(ctest_config.cmake)
          set(ENV{DIR_UNIT_TEST_DATA} ${CTEST_SCRIPT_DIRECTORY}/qa-assets/unit_test_data)
          ctest_start(APPEND)
          ctest_test(PARALLEL_LEVEL ${nproc})
          EOF
          ctest --script ctest_test.cmake

      - &CDASH_SUBMIT
        name: CDash -- Submit
        if: always()
        run: |
          cat << 'EOF' > ctest_submit.cmake
          include(ctest_config.cmake)
          ctest_start(APPEND)
          ctest_submit()
          EOF
          ctest --script ctest_submit.cmake

      - &RUN_FUNCTIONAL_TESTS
        name: Run functional tests
        if: ${{ ! inputs.skip_functional_tests }}
        run: |
          set -e
          build/test/functional/test_runner.py -j $((${{ env.CI_NCPU }} * 2)) --combinedlogslen=99999999 \
            --extended \
            `# See https://github.com/bitcoin/bitcoin/issues/33128.` \
            --exclude feature_reindex_init \
            `# Tests using lsof may fail due to the following warning:` \
            `# lsof: WARNING -- reading lockf list failed: Cannot allocate memory` \
            `# Run them separately in the subsequent command.` \
            --exclude feature_bind_extra \
            --exclude rpc_bind \
            --timeout-factor=8
          build/test/functional/test_runner.py feature_bind_extra rpc_bind -j 1 --combinedlogslen=99999999 \
            --timeout-factor=8

  freebsd-depends:
    name: 'FreeBSD ${{ matrix.release }}, depends'
    runs-on: ubuntu-latest
    env:
      PACKAGES: 'bash gmake bison'
    defaults:
      run:
        shell: freebsd {0}
    strategy: *RELEASE_MATRIX

    steps:
      - *CLEAR_STORAGE_SPACE
      - *START_VM
      - *FETCH_SOURCE

      - name: Checkout helper actions
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github/actions/build-depends
          path: ci/nightly

      - name: Build depends
        uses: ./ci/nightly/.github/actions/build-depends
        with:
          vm: freebsd
          source-dir: /root/bitcoin
          cache-tag: freebsd-${{ matrix.release }}

      - name: Generate CTest configuration
        run: |
          cat << 'EOF' > ctest_config.cmake
          set(CTEST_SITE "${{ github.repository }}")
          set(CTEST_BUILD_NAME "FreeBSD ${{ matrix.release }}, depends")
          set(CTEST_SOURCE_DIRECTORY "${CTEST_SCRIPT_DIRECTORY}/bitcoin")
          set(CTEST_BINARY_DIRECTORY "${CTEST_SCRIPT_DIRECTORY}/build")
          set(CTEST_CMAKE_GENERATOR "Ninja")
          cmake_host_system_information(RESULT nproc QUERY NUMBER_OF_LOGICAL_CORES)
          EOF

      - *CDASH_START_UPDATE

      - name: CDash -- Configure
        run: |
          cat << 'EOF' > ctest_configure.cmake
          include(ctest_config.cmake)
          set(configure_opts
            "--toolchain /root/bitcoin/depends/x86_64-unknown-freebsd${{ matrix.release }}/toolchain.cmake"
            "--preset dev-mode"
            "-DWITH_USDT=OFF"
            "-DCMAKE_COMPILE_WARNING_AS_ERROR=ON"
          )
          ctest_start(APPEND)
          ctest_configure(OPTIONS "${configure_opts}")
          EOF
          ctest --extra-verbose --script ctest_configure.cmake

      - *CDASH_BUILD
      - *CHECK_BITCOIND
      - *CDASH_TEST
      - *CDASH_SUBMIT
      - *RUN_FUNCTIONAL_TESTS
