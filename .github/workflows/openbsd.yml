name: OpenBSD
on:
  pull_request:
    paths:
      - '.github/actions/build-depends/action.yml'
      - '.github/workflows/openbsd.yml'
  workflow_dispatch:
    inputs:
      repository:
        description: 'Repository name with owner'
        required: true
        default: bitcoin/bitcoin
        type: string
      ref:
        description: 'Repository reference: refs/heads/<branch>, refs/tags/<tag>, refs/pull/<PR>/head or refs/<commit>'
        required: true
        default: refs/heads/master
        type: string
      skip_functional_tests:
        description: 'Skip functional tests'
        required: true
        default: false
        type: boolean
  workflow_run:
    workflows: ["Manager"]
    types: [requested]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}${{ github.event_name != 'pull_request' && github.run_id || github.ref }}
  cancel-in-progress: true

env:
  # See https://docs.github.com/en/actions/reference/runners/github-hosted-runners#standard-github-hosted-runners-for-public-repositories.
  CI_NCPU: 4

jobs:
  openbsd-syslibs:
    name: 'OpenBSD ${{ matrix.release }}, system libs, no GUI'
    runs-on: ubuntu-latest
    env:
      PACKAGES: 'boost sqlite3 capnproto zeromq'
    defaults:
      run:
        shell: openbsd {0}
    strategy: &RELEASE_MATRIX
      fail-fast: false
      matrix:
        # Test all supported releases.
        # From https://www.openbsd.org/faq/faq5.html:
        # > Only the two most recent OpenBSD releases receive
        # > security and reliability fixes for the base system.
        release: ['7.8', '7.9']

    steps:
      - &START_VM
        name: Start OpenBSD VM
        uses: vmactions/openbsd-vm@v1
        with:
          release: ${{ matrix.release }}
          prepare: pkg_add -U -v curl gtar-- cmake-core ninja python%3 ${{ env.PACKAGES }}
          sync: no
          disable-cache: true

      - &FETCH_SOURCE
        name: Fetch source tarball
        run: |
          set -e
          curl --location --fail --output source.tar.gz https://github.com/${{ inputs.repository || 'bitcoin/bitcoin' }}/archive/${{ inputs.ref || 'refs/heads/master' }}.tar.gz
          mkdir /home/bitcoin
          gtar -xf source.tar.gz -C /home/bitcoin --strip-components=1
          rm -rf source.tar.gz
          # Test data.
          DIR_UNIT_TEST_DATA=/home/qa-assets/unit_test_data
          mkdir -p "$DIR_UNIT_TEST_DATA"
          curl --location --fail --output "${DIR_UNIT_TEST_DATA}/script_assets_test.json" https://github.com/bitcoin-core/qa-assets/raw/main/unit_test_data/script_assets_test.json

      - name: Generate CTest configuration
        run: |
          cat << 'EOF' > ctest_config.cmake
          set(CTEST_SITE "${{ github.repository }}")
          set(CTEST_BUILD_NAME "OpenBSD ${{ matrix.release }}, system libs, no GUI")
          set(CTEST_SOURCE_DIRECTORY "/home/bitcoin")
          set(CTEST_BINARY_DIRECTORY "/home/build")
          set(CTEST_CMAKE_GENERATOR "Ninja")
          cmake_host_system_information(RESULT nproc QUERY NUMBER_OF_LOGICAL_CORES)
          EOF

      - &CDASH_START_UPDATE
        name: CDash -- Start & Update
        run: |
          COMMIT="$(awk -F '"' '/^#define GIT_COMMIT_ID/ {print $2}' /home/bitcoin/src/clientversion.cpp)"
          echo "set(CTEST_UPDATE_VERSION_OVERRIDE $COMMIT)" >> ctest_update_version_override.cmake
          cat << 'EOF' > ctest_start_upate.cmake
          include(ctest_config.cmake)
          ctest_start(${{ case(github.event_name == 'workflow_run', 'Nightly', format('Experimental GROUP {0}', github.event_name)) }})
          set(CTEST_UPDATE_TYPE git)
          # This command may be redundant once the following MR is merged:
          # https://gitlab.kitware.com/cmake/cmake/-/merge_requests/12038
          set(CTEST_UPDATE_COMMAND "${CMAKE_COMMAND} -E true")
          include(ctest_update_version_override.cmake)
          ctest_update()
          EOF
          ctest --script ctest_start_upate.cmake
          # A hack to work around the broken CTEST_UPDATE_VERSION_OVERRIDE.
          sed -i 's/\([[:blank:]]*\)<UpdateType>Unknown<\/UpdateType>/\1<UpdateType>GIT<\/UpdateType>\
            \1<Revision>'"$COMMIT"'<\/Revision>/' "/home/build/Testing/$(head -1 /home/build/Testing/TAG)/Update.xml"

      - name: CDash -- Configure
        run: |
          cat << 'EOF' > ctest_configure.cmake
          include(ctest_config.cmake)
          set(configure_opts
            "--preset dev-mode"
            "-DBUILD_GUI=OFF"
            "-DWITH_USDT=OFF"
            "-DCMAKE_COMPILE_WARNING_AS_ERROR=ON"
          )
          ctest_start(APPEND)
          ctest_configure(OPTIONS "${configure_opts}")
          EOF
          ctest --extra-verbose --script ctest_configure.cmake

      - &CDASH_BUILD
        name: CDash -- Build
        run: |
          cat << 'EOF' > ctest_build.cmake
          include(ctest_config.cmake)
          ctest_start(APPEND)
          ctest_build(PARALLEL_LEVEL ${nproc})
          EOF
          ctest --extra-verbose --script ctest_build.cmake

      - &CHECK_BITCOIND
        name: Check 'bitcoind' executable
        run: |
          set -e
          ls -l /home/build/bin/bitcoind
          file /home/build/bin/bitcoind
          ldd /home/build/bin/bitcoind
          /home/build/bin/bitcoind -version

      - &CDASH_TEST
        name: CDash -- Test
        run: |
          cat << 'EOF' > ctest_test.cmake
          include(ctest_config.cmake)
          set(ENV{DIR_UNIT_TEST_DATA} /home/qa-assets/unit_test_data)
          ctest_start(APPEND)
          ctest_test(PARALLEL_LEVEL ${nproc})
          EOF
          ctest --script ctest_test.cmake

      - &CDASH_SUBMIT
        name: CDash -- Submit
        if: always()
        run: |
          cat << 'EOF' > ctest_submit.cmake
          include(ctest_config.cmake)
          ctest_start(APPEND)
          ctest_submit()
          EOF
          ctest --script ctest_submit.cmake

      - &FUNCTIONAL_TESTS_DEPS
        name: Install functional test dependencies
        if: ${{ ! inputs.skip_functional_tests }}
        run: |
          set -e
          pkg_add -U -v py3-pip py3-zmq
          # The system's `capnproto` package ships static libraries
          # built without -fPIC, causing relocation errors when linking
          # pycapnp's shared extension module.
          #
          # A two-part workaround is applied:
          #  1. Force building the bundled libcapnp, which is compiled
          #     with -fPIC.
          #  2. Override LDCXXSHARED to drop the -L/usr/local/lib/ that
          #     Python's sysconfig injects ahead of the bundled library
          #     directories, and which would otherwise resolve -lcapnp*
          #     and -lkj* to the system's static archives.
          if pkg_info -e 'capnproto-*'; then
            LDCXXSHARED="c++ -pthread -shared -fPIC" pip3 install --break-system-packages pycapnp -C force-bundled-libcapnp=True
          else
            pip3 install --break-system-packages pycapnp
          fi
          python3 --version
          python3 -c "import sqlite3; print(f'SQLite {sqlite3.sqlite_version}')"
          python3 -c "import capnp; print(f'pycapnp {capnp.__version__} / libcapnp {capnp.version.LIBCAPNP_VERSION_MAJOR}.{capnp.version.LIBCAPNP_VERSION_MINOR}.{capnp.version.LIBCAPNP_VERSION_MICRO}')"
          python3 -c "import zmq; print(f'pyzmq {zmq.__version__} / libzmq {zmq.zmq_version()}')"

      - &CHECK_HOST_DISK_SPACE
        name: Check host disk space
        if: ${{ ! inputs.skip_functional_tests }}
        shell: bash
        run: df -h

      - &RUN_FUNCTIONAL_TESTS
        name: Run functional tests
        if: ${{ ! inputs.skip_functional_tests }}
        run: |
          set -e
          ulimit -n 1024
          /home/build/test/functional/test_runner.py -j $((${{ env.CI_NCPU }} * 2)) --combinedlogslen=99999999 \
            --tmpdirprefix /home \
            --extended \
            `# See https://github.com/bitcoin/bitcoin/issues/33128.` \
            --exclude feature_reindex_init \
            `# interface_rest intermittently hangs since 2025-10-23. Running separately in the next command.` \
            --exclude interface_rest \
            `# Disable tests using lsof, as this package is not available.` \
            --exclude feature_bind_extra \
            --exclude rpc_bind \
            --timeout-factor=8
          /home/build/test/functional/test_runner.py interface_rest --combinedlogslen=99999999 \
            --tmpdirprefix /home \
            --timeout-factor=16

  openbsd-depends:
    name: 'OpenBSD ${{ matrix.release }}, depends'
    runs-on: ubuntu-latest
    env:
      PACKAGES: 'bash gmake'
    defaults:
      run:
        shell: openbsd {0}
    strategy: *RELEASE_MATRIX

    steps:
      - *START_VM
      - *FETCH_SOURCE

      - name: Checkout helper actions
        uses: actions/checkout@v7
        with:
          sparse-checkout: .github/actions/build-depends
          path: ci/nightly

      - name: Build depends
        uses: ./ci/nightly/.github/actions/build-depends
        with:
          vm: openbsd
          source-dir: /home/bitcoin
          cache-tag: openbsd-${{ matrix.release }}

      - name: Generate CTest configuration
        run: |
          cat << 'EOF' > ctest_config.cmake
          set(CTEST_SITE "${{ github.repository }}")
          set(CTEST_BUILD_NAME "OpenBSD ${{ matrix.release }}, depends")
          set(CTEST_SOURCE_DIRECTORY "/home/bitcoin")
          set(CTEST_BINARY_DIRECTORY "/home/build")
          set(CTEST_CMAKE_GENERATOR "Ninja")
          cmake_host_system_information(RESULT nproc QUERY NUMBER_OF_LOGICAL_CORES)
          EOF

      - *CDASH_START_UPDATE

      - name: CDash -- Configure
        run: |
          cat << 'EOF' > ctest_configure.cmake
          include(ctest_config.cmake)
          set(configure_opts
            "--toolchain /home/bitcoin/depends/x86_64-unknown-openbsd${{ matrix.release }}/toolchain.cmake"
            "--preset dev-mode"
            "-DBUILD_GUI=OFF"
            "-DWITH_USDT=OFF"
            "-DCMAKE_COMPILE_WARNING_AS_ERROR=ON"
          )
          ctest_start(APPEND)
          ctest_configure(OPTIONS "${configure_opts}")
          EOF
          ctest --extra-verbose --script ctest_configure.cmake

      - *CDASH_BUILD
      - *CHECK_BITCOIND
      - *CDASH_TEST
      - *CDASH_SUBMIT
      - *FUNCTIONAL_TESTS_DEPS
      - *CHECK_HOST_DISK_SPACE
      - *RUN_FUNCTIONAL_TESTS
